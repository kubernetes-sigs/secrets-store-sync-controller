{{- if .Values.validatingAdmissionPolicies.applyPolicies -}}
{{ include "secrets-store-sync-controller.admissionApiVersion" . }}
kind: ValidatingAdmissionPolicy
metadata:
  name: "secrets-store-sync-controller-update-check-oldobject-policy"
  annotations:
    kubernetes.io/description: >
      This policy validates that when the secrets-store-sync-controller updates a Secret,
      the previous version of the Secret only had a single owner that matches the policy
      expectations.

      Unlike the 'secrets-store-sync-controller-create-update-policy' that runs on both
      CREATE and UPDATE, this policy only makes sense for UPDATEs because of the oldobject check.
spec:
  failurePolicy: Fail
  matchConditions:
    - name: 'user-is-secrets-store-sync-controller'
      expression: {{ include "chartname.matchConditionExpression" . | quote }}
  matchConstraints:
    resourceRules:
    - apiGroups:   [""]
      apiVersions: ["v1"]
      operations:  ["UPDATE"]
      resources:   ["secrets"]
  variables:
  - name: hasOneSecretSyncOwner
    expression: "has(oldObject.metadata.ownerReferences) && size(oldObject.metadata.ownerReferences) == 1 && oldObject.metadata.ownerReferences.all(o, o.kind == 'SecretSync' && o.apiVersion.startsWith('secret-sync.x-k8s.io/') && o.name == object.metadata.name)"
  validations:
  - expression: "variables.hasOneSecretSyncOwner == true"
    message: "Only secrets with one secret sync owner can be updated by the controller"
    messageExpression: "'secrets-store-sync-controller has failed to ' +  string(request.operation) + ' old secret in the ' + string(request.namespace) + ' namespace. The controller can only update secrets with a single secrets-store-sync-controller owner.'"
    reason: "Forbidden"
{{- end -}}

name: 'Ensure codegen works'
on: [pull_request]

permissions:
  contents: read

jobs:
  verify-codegen:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "^1.26"
      - name: Run codegens
        run: |
          make generate
          make manifests
      - name: Verify git output
        shell: bash
        run: |
          cp ./config/crd/bases/secret-sync.x-k8s.io_secretsyncs.yaml ./manifest_staging/charts/secrets-store-sync-controller/crds/secret-sync.x-k8s.io_secretsyncs.yaml
          if [ -n "$(git status -s)" ]; then
            echo 'Detected code generation changes'
            echo 'Make sure to run `make generate` and `make manifests` and commit those changes'
            git diff
            exit 1
          fi
